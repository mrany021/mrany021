<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Term IV — Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#EEF1F4;
    --surface:#FFFFFF;
    --ink:#16213E;
    --ink-soft:#3B4A6B;
    --muted:#6B7280;
    --border:#DCE1E8;
    --brass:#B8863B;
    --brass-soft:#F3E8D4;
    --success:#2F6F4E;
    --success-soft:#E3EFE8;
    --danger:#A23B3B;
    --danger-soft:#F3E2E1;
    --shadow: 0 1px 2px rgba(22,33,62,0.06), 0 4px 16px rgba(22,33,62,0.05);

    --c-MCA:#4A5FA5;      --c-MCA-soft:#E7EAF5;
    --c-BDMDMA:#2F8F7A;   --c-BDMDMA-soft:#E1F1EC;
    --c-MFSM:#B8863B;     --c-MFSM-soft:#F3E8D4;
    --c-DDMA:#B4552F;     --c-DDMA-soft:#F5E5DD;
    --c-FDB:#7A4FA0;      --c-FDB-soft:#EEE5F4;
    --c-CSGB:#3D7A45;     --c-CSGB-soft:#E3EEE4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:48px;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 16px;}

  header.top{
    padding:28px 16px 18px;
    max-width:640px;margin:0 auto;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:600;
    margin-bottom:6px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:28px;
    font-weight:600;
    letter-spacing:-0.01em;
    margin:0 0 4px;
    color:var(--ink);
  }
  .sub{
    font-size:13px;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
  }

  .account-bar{
    margin-top:12px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .signin-btn{
    display:flex;align-items:center;gap:8px;
    background:var(--ink);color:#fff;
    border:none;border-radius:8px;
    padding:8px 14px;
    font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
    cursor:pointer;
  }
  .account-chip{
    display:flex;align-items:center;gap:8px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:5px 12px 5px 5px;
  }
  .account-chip img{width:24px;height:24px;border-radius:50%;}
  .account-chip .email{font-size:12px;color:var(--ink-soft);font-weight:600;}
  .signout-link{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
    background:none;border:none;cursor:pointer;text-decoration:underline;
  }
  .sync-banner{
    margin:0 16px 12px;
    padding:8px 12px;
    border-radius:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    text-align:center;
  }
  .sync-banner.ok{background:var(--success-soft);color:var(--success);}
  .sync-banner.err{background:var(--danger-soft);color:var(--danger);}
  .sync-banner.local{background:var(--brass-soft);color:var(--brass);}

  .tabs{
    display:flex;
    gap:4px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:4px;
    margin:18px 16px 16px;
    max-width:608px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .tab-btn{
    flex:1;
    border:none;
    background:transparent;
    padding:9px 8px;
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    color:var(--muted);
    border-radius:7px;
    cursor:pointer;
    transition:all .15s ease;
    white-space:nowrap;
  }
  .tab-btn.active{
    background:var(--ink);
    color:#fff;
  }

  .view{display:none;}
  .view.active{display:block;}

  /* ---- Next class banner ---- */
  .banner{
    margin:0 16px 20px;
    background:var(--ink);
    color:#fff;
    border-radius:14px;
    padding:18px 20px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .banner::before{
    content:'';
    position:absolute;
    top:-30%;right:-10%;
    width:140px;height:140px;
    border-radius:50%;
    background:rgba(184,134,59,0.18);
  }
  .banner .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:700;
    margin-bottom:8px;
  }
  .banner .course-line{
    font-family:'Fraunces',serif;
    font-size:22px;
    font-weight:600;
    margin-bottom:4px;
  }
  .banner .meta-line{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:rgba(255,255,255,0.75);
  }

  /* ---- date group ---- */
  .date-group{margin:0 16px 22px;}
  .date-head{
    display:flex;
    align-items:baseline;
    gap:8px;
    margin-bottom:8px;
    padding-left:2px;
  }
  .date-head .d{
    font-family:'Fraunces',serif;
    font-size:16px;
    font-weight:600;
    color:var(--ink);
  }
  .date-head .w{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
  }
  .date-head.today .d{color:var(--brass);}
  .date-head.today .d::after{
    content:'TODAY';
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    letter-spacing:0.1em;
    background:var(--brass-soft);
    color:var(--brass);
    padding:2px 6px;
    border-radius:4px;
    margin-left:8px;
    font-weight:700;
    vertical-align:middle;
  }

  .session-row{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:6px;
  }
  .session-row.past{opacity:0.92;}
  .time-col{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    width:88px;
    flex-shrink:0;
    line-height:1.3;
  }
  .time-col .end{color:var(--muted);}
  .pill{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    font-weight:700;
    padding:3px 8px;
    border-radius:6px;
    white-space:nowrap;
  }
  .course-info{flex:1;min-width:0;}
  .course-info .name{
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    margin-bottom:2px;
  }
  .course-info .room{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
  }
  .course-info .topic{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:3px;
    line-height:1.4;
    cursor:pointer;
  }
  .prep-toggle{
    color:var(--brass);
    font-size:10.5px;
    font-weight:600;
    margin-left:4px;
    white-space:nowrap;
  }
  .prep-detail{
    display:none;
    margin-top:8px;
    padding:10px 12px;
    background:var(--bg);
    border-radius:8px;
    border-left:3px solid var(--brass);
  }
  .prep-detail.open{display:block;}
  .prep-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:700;
    margin:6px 0 3px;
  }
  .prep-label:first-child{margin-top:0;}
  .prep-list{
    margin:0 0 4px;
    padding-left:16px;
    font-size:12px;
    color:var(--ink-soft);
    line-height:1.5;
  }
  .prep-list li{margin-bottom:3px;}
  .prep-empty{font-size:12px;color:var(--muted);font-style:italic;}
  .stamp-group{display:flex;gap:4px;flex-shrink:0;}
  .stamp{
    width:30px;height:30px;
    border-radius:7px;
    border:1.5px solid var(--border);
    background:#fff;
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:12px;
    color:var(--muted);
    cursor:pointer;
    transition:transform .1s ease;
  }
  .stamp:active{transform:scale(0.92);}
  .stamp.p.on{background:var(--success-soft);border-color:var(--success);color:var(--success);transform:rotate(-4deg);}
  .stamp.a.on{background:var(--danger-soft);border-color:var(--danger);color:var(--danger);transform:rotate(3deg);}
  .future-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    letter-spacing:0.06em;
    text-transform:uppercase;
  }

  /* ---- attendance view ---- */
  .attn-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px 18px;
    margin:0 16px 12px;
    box-shadow:var(--shadow);
  }
  .attn-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .attn-name{font-family:'Fraunces',serif;font-size:17px;font-weight:600;}
  .attn-code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
  .attn-pct{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;}
  .attn-pct.good{color:var(--success);}
  .attn-pct.bad{color:var(--danger);}
  .bar-track{
    height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:8px;position:relative;
  }
  .bar-fill{height:100%;border-radius:3px;transition:width .3s ease;}
  .bar-track::after{
    content:'';
    position:absolute;left:75%;top:-2px;bottom:-2px;
    width:2px;background:var(--ink-soft);opacity:0.35;
  }
  .attn-meta{
    display:flex;justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--muted);
  }
  .threshold-note{
    font-size:10px;color:var(--muted);margin-top:6px;font-family:'JetBrains Mono',monospace;
  }

  .empty-note{
    text-align:center;color:var(--muted);font-size:13px;padding:30px 16px;
  }

  /* ---- day-wise view ---- */
  .day-selector{
    display:flex;gap:6px;overflow-x:auto;padding:0 16px 14px;
    -webkit-overflow-scrolling:touch;
  }
  .day-chip{
    flex-shrink:0;
    border:1.5px solid var(--border);
    background:var(--surface);
    color:var(--ink-soft);
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    font-weight:600;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
  }
  .day-chip.active{
    background:var(--ink);border-color:var(--ink);color:#fff;
  }
  .section-label{
    font-family:'Fraunces',serif;
    font-size:15px;
    font-weight:600;
    margin:18px 16px 8px;
    color:var(--ink);
    display:flex;align-items:center;gap:8px;
  }
  .section-label .note{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    font-weight:500;
  }
  .meal-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    margin:0 16px 8px;
  }
  .meal-name{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:700;
    margin-bottom:6px;
  }
  .meal-items{font-size:13px;line-height:1.55;color:var(--ink-soft);}
  .meal-items b{color:var(--ink);font-weight:600;}

  /* ---- wholesome combined view ---- */
  .day-meal-strip{
    display:flex;gap:6px;overflow-x:auto;margin:0 0 10px;
    -webkit-overflow-scrolling:touch;
  }
  .meal-chip{
    flex-shrink:0;
    background:var(--brass-soft);
    color:var(--brass);
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    font-weight:700;
    padding:5px 9px;
    border-radius:6px;
    white-space:nowrap;
  }

  /* ---- nutrition view ---- */
  .nutri-summary{
    margin:0 16px 16px;
    background:var(--ink);
    color:#fff;
    border-radius:14px;
    padding:18px 20px;
    box-shadow:var(--shadow);
  }
  .nutri-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .nutri-row:last-child{margin-bottom:0;}
  .nutri-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,0.65);text-transform:uppercase;letter-spacing:0.08em;}
  .nutri-value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;}
  .nutri-value .of{font-size:12px;color:rgba(255,255,255,0.55);font-weight:500;}
  .nutri-value.over{color:#E8A9A9;}
  .nutri-bar-track{height:6px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden;margin-top:6px;}
  .nutri-bar-fill{height:100%;border-radius:3px;transition:width .3s ease;}

  .food-item{
    display:flex;align-items:center;gap:10px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    margin:0 16px 6px;
  }
  .food-check{
    width:20px;height:20px;flex-shrink:0;
    border-radius:6px;border:1.5px solid var(--border);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;color:transparent;
    background:#fff;
  }
  .food-check.on{background:var(--success);border-color:var(--success);color:#fff;}
  .food-name{flex:1;font-size:13px;font-weight:500;color:var(--ink);}
  .food-macro{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
  .egg-stepper{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .egg-btn{
    width:24px;height:24px;border-radius:6px;border:1.5px solid var(--border);
    background:#fff;font-weight:700;color:var(--ink-soft);cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .egg-count{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;width:16px;text-align:center;}

  /* ---- insights view ---- */
  .insight-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px 18px;
    margin:0 16px 12px;
    box-shadow:var(--shadow);
  }
  .insight-card h3{
    font-family:'Fraunces',serif;
    font-size:15px;
    font-weight:600;
    margin:0 0 10px;
    color:var(--ink);
  }
  .insight-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 0;border-bottom:1px solid var(--bg);
  }
  .insight-row:last-child{border-bottom:none;}
  .insight-course{font-size:13px;font-weight:600;color:var(--ink);}
  .insight-badge{
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
    padding:3px 9px;border-radius:20px;
  }
  .badge-safe{background:var(--success-soft);color:var(--success);}
  .badge-watch{background:var(--brass-soft);color:var(--brass);}
  .badge-critical{background:var(--danger-soft);color:var(--danger);}
  .insight-detail{font-size:12px;color:var(--muted);margin-top:2px;}
  .insight-stat-row{display:flex;gap:12px;margin-bottom:10px;}
  .insight-stat{flex:1;text-align:center;background:var(--bg);border-radius:10px;padding:10px 6px;}
  .insight-stat .num{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--ink);}
  .insight-stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
  .insight-msg{font-size:13px;color:var(--ink-soft);line-height:1.5;padding:10px 0 0;}
  .legend{
    display:flex;gap:14px;justify-content:center;margin:4px 16px 18px;flex-wrap:wrap;
  }
  .legend span{
    font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
    display:flex;align-items:center;gap:5px;
  }
  .legend .dot{width:8px;height:8px;border-radius:50%;}
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow">IIM Nagpur · PGP-1 · P25080</div>
  <h1>Term IV Ledger</h1>
  <div class="sub">Batch 2025–27 · 22 Jun – 04 Sep 2026</div>
  <div id="account-bar" class="account-bar"></div>
</header>

<div id="sync-banner" class="sync-banner" style="display:none;"></div>

<div class="tabs">
  <button class="tab-btn active" data-view="schedule">Schedule</button>
  <button class="tab-btn" data-view="wholesome">Wholesome</button>
  <button class="tab-btn" data-view="nutrition">Nutrition</button>
  <button class="tab-btn" data-view="attendance">Attendance</button>
  <button class="tab-btn" data-view="insights">Insights</button>
</div>

<div class="legend">
  <span><i class="dot" style="background:var(--c-MCA)"></i>MC-A</span>
  <span><i class="dot" style="background:var(--c-BDMDMA)"></i>BDMDM-A</span>
  <span><i class="dot" style="background:var(--c-MFSM)"></i>MFSM</span>
  <span><i class="dot" style="background:var(--c-DDMA)"></i>DDM-A</span>
  <span><i class="dot" style="background:var(--c-FDB)"></i>FD-B</span>
  <span><i class="dot" style="background:var(--c-CSGB)"></i>CSG-B</span>
</div>

<div id="schedule-view" class="view active">
  <div id="banner-slot"></div>
  <div id="schedule-list"></div>
</div>

<div id="wholesome-view" class="view">
  <div id="wholesome-list"></div>
</div>

<div id="nutrition-view" class="view">
  <div class="day-selector" id="nutri-day-selector"></div>
  <div id="nutri-summary"></div>
  <div id="nutri-log"></div>
</div>

<div id="attendance-view" class="view">
  <div id="attendance-list"></div>
</div>

<div id="insights-view" class="view">
  <div id="insights-list"></div>
</div>

<script>
/* ============================================================
   CONFIG — fill these in to go live with your own account + sheets.
   Leave as-is to keep using local Claude-artifact storage only.
   ============================================================ */
const CONFIG = {
  // From Firebase Console → Project Settings → General → Your apps → Web app
  firebase: {
    apiKey: "PASTE_YOUR_FIREBASE_API_KEY",
    authDomain: "PASTE_YOUR_PROJECT.firebaseapp.com",
    projectId: "PASTE_YOUR_PROJECT_ID",
    storageBucket: "PASTE_YOUR_PROJECT.appspot.com",
    messagingSenderId: "PASTE_SENDER_ID",
    appId: "PASTE_APP_ID"
  },
  // File → Share → Publish to web → CSV, for each sheet
  timetableCsvUrl: "",  // e.g. "https://docs.google.com/spreadsheets/d/e/.../pub?output=csv"
  messMenuCsvUrl: ""    // same, for the mess menu sheet
};

const FIREBASE_ENABLED = CONFIG.firebase.apiKey !== "PASTE_YOUR_FIREBASE_API_KEY";
let currentUser = null;
let db = null;

function showSyncBanner(msg, cls){
  const b = document.getElementById('sync-banner');
  b.textContent = msg;
  b.className = 'sync-banner ' + cls;
  b.style.display = 'block';
}

function initFirebase(){
  if(!FIREBASE_ENABLED){
    showSyncBanner('Running in local mode — no Firebase config set yet. See setup guide.', 'local');
    renderAccountBar();
    return;
  }
  firebase.initializeApp(CONFIG.firebase);
  db = firebase.firestore();
  firebase.auth().onAuthStateChanged(user=>{
    currentUser = user;
    renderAccountBar();
    if(user){
      // reload everything now that we know who's signed in
      initAfterAuth();
    }
  });
}

function renderAccountBar(){
  const bar = document.getElementById('account-bar');
  if(!FIREBASE_ENABLED){
    bar.innerHTML = '';
    return;
  }
  if(currentUser){
    bar.innerHTML = `
      <div class="account-chip">
        <img src="${currentUser.photoURL||''}" onerror="this.style.display='none'">
        <span class="email">${currentUser.displayName||currentUser.email}</span>
      </div>
      <button class="signout-link" onclick="doSignOut()">sign out</button>`;
  } else {
    bar.innerHTML = `<button class="signin-btn" onclick="doSignIn()">Sign in with Google</button>`;
  }
}

async function doSignIn(){
  const provider = new firebase.auth.GoogleAuthProvider();
  try{
    await firebase.auth().signInWithPopup(provider);
  }catch(e){

/* ---- Firestore-backed data layer (falls back to window.storage when signed out) ---- */
async function remoteGet(field){
  if(!(FIREBASE_ENABLED && currentUser)) return null;
  const doc = await db.collection('users').doc(currentUser.uid).get();
  if(!doc.exists) return null;
  return doc.data()[field] ?? null;
}
async function remoteSet(field, value){
  if(!(FIREBASE_ENABLED && currentUser)) return;
  await db.collection('users').doc(currentUser.uid).set({[field]: value}, {merge:true});
}

/* ---- Live sheet sync ---- */
function csvToRows(csvText){
  // minimal CSV parser handling quoted commas
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<csvText.length;i++){
    const c = csvText[i];
    if(inQuotes){
      if(c === '"'){
        if(csvText[i+1] === '"'){ field+='"'; i++; } else { inQuotes=false; }
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

const SLOT_TIMES = {1:["08:30","10:00"],2:["10:15","11:45"],3:["12:00","13:30"],4:["14:30","16:00"],5:["16:15","17:45"],6:["18:00","19:30"],7:["19:45","21:15"],8:["21:45","23:15"]};
const SESSION_PATTERN = /([A-Z]{2,6}(?:-[A-Z])?)\/(\d+)\/(CR\s?\d+)/g;

function parseTimetableCSV(csvText){
  const rows = csvToRows(csvText);
  const parsed = [];
  for(const cells of rows){
    if(cells.length < 4) continue;
    const day = (cells[1]||'').trim();
    const dateStr = (cells[2]||'').trim();
    if(!day || !dateStr) continue;
    const d = new Date(dateStr.replace(/(\d+)[- ]([A-Za-z]+)[- ](\d+)/, '$2 $1, $3'));
    if(isNaN(d)) continue;
    const iso = d.toISOString().slice(0,10);
    for(let slot=1; slot<=8; slot++){
      const cell = cells[3+slot-1] || '';
      let m;
      SESSION_PATTERN.lastIndex = 0;
      while((m = SESSION_PATTERN.exec(cell)) !== null){
        const [, course, sessionNo, room] = m;
        if(!TRACKED_COURSES.includes(course)) continue;
        const [start,end] = SLOT_TIMES[slot] || ["",""];
        parsed.push({week:"", day, date:dateStr, slot, start, end, course, session_no:parseInt(sessionNo), room:room.replace(/\s/g,''), iso});
      }
    }
  }
  return parsed;
}

function parseMessMenuCSV(csvText){
  // Expects same shape as the original sheet: Meal | Item | Mon..Sun rows
  const rows = csvToRows(csvText);
  const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const menu = {}; days.forEach(d=>menu[d]={});
  for(const cells of rows){
    if(cells.length < 9) continue;
    const meal = (cells[0]||'').trim();
    const cat = (cells[1]||'').trim();
    if(!meal || !cat || meal==='Meal') continue;
    for(let i=0;i<7;i++){
      const val = (cells[2+i]||'').trim();
      if(!menu[days[i]][meal]) menu[days[i]][meal] = {};
      menu[days[i]][meal][cat] = val || '—';
    }
  }
  return menu;
}

async function trySyncFromSheets(){
  if(!CONFIG.timetableCsvUrl && !CONFIG.messMenuCsvUrl){
    return; // no URLs configured — stick with baked-in data
  }
  try{
    if(CONFIG.timetableCsvUrl){
      const res = await fetch(CONFIG.timetableCsvUrl);
      const text = await res.text();
      const fresh = parseTimetableCSV(text);
      if(fresh.length > 0){
        SESSIONS.length = 0;
        SESSIONS.push(...fresh.sort((a,b)=> a.iso.localeCompare(b.iso) || a.slot-b.slot));
      }
    }
    if(CONFIG.messMenuCsvUrl){
      const res2 = await fetch(CONFIG.messMenuCsvUrl);
      const text2 = await res2.text();
      const freshMenu = parseMessMenuCSV(text2);
      if(Object.keys(freshMenu).length){
        Object.keys(MESS_MENU).forEach(k=>delete MESS_MENU[k]);
        Object.assign(MESS_MENU, freshMenu);
      }
    }
    showSyncBanner('Synced live from your Google Sheets ✓', 'ok');
  }catch(e){
    showSyncBanner('Could not reach live sheets — showing last saved data.', 'err');
  }
}

function todayISO(){
  const d = new Date();
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function nowMinutes(){
  const d = new Date();
  return d.getHours()*60 + d.getMinutes();
}
function toMinutes(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  return h*60+m;
}

async function loadAttendance(){
  if(FIREBASE_ENABLED && currentUser){
    const remote = await remoteGet('attendance');
    if(remote){ attendance = remote; return; }
  }
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    attendance = res && res.value ? JSON.parse(res.value) : {};
  }catch(e){
    attendance = {};
  }

function groupByDate(sessions){

  for(const s of sessions){

    map[s.iso].push(s);

}

const MEAL_TIME_RANGES = {
  Breakfast: [420, 570],   // 07:00 - 09:30
  Lunch:     [720, 870],   // 12:00 - 14:30
  Snacks:    [990, 1080],  // 16:30 - 18:00
  Dinner:    [1170, 1290], // 19:30 - 21:30
};

function getCurrentMealInfo(){
  const nm = nowMinutes();
  for(const [meal, [start,end]] of Object.entries(MEAL_TIME_RANGES)){
    if(nm>=start && nm<=end) return {meal, active:true};
  }
  // find next upcoming meal today
  let next=null;
  for(const [meal, [start]] of Object.entries(MEAL_TIME_RANGES)){
    if(start > nm){ next = meal; break; }
  }
  return {meal: next, active:false};
}

function fmtMinutes(m){
  const h = Math.floor(m/60), mi = m%60;
  const period = h>=12 ? 'PM':'AM';
  const h12 = h%12===0?12:h%12;
  return `${h12}:${String(mi).padStart(2,'0')} ${period}`;
}

function computeNutriTotals(){
  let kcal=0, protein=0;
  for(const key in nutriLog.checked){
    if(!nutriLog.checked[key]) continue;
    const itemName = key.split('::')[1];
    const n = NUTRITION_DB[itemName];
    if(n){ kcal += n[0]; protein += n[1]; }
  }
  const eggs = nutriLog.eggs || 0;
  kcal += eggs*70;
  protein += eggs*6;
  return {kcal, protein};
}

  const {kcal, protein} = computeNutriTotals();
  const kcalPct = Math.min(100, Math.round((kcal/CALORIE_TARGET)*100));

  const kcalOver = kcal > CALORIE_TARGET;

  const isTodaySelected = nutriDay === todayISO();
  const dateObj = new Date(nutriDay+'T00:00:00');

  document.getElementById('nutri-summary').innerHTML = `

        ${isTodaySelected?'Today · ':''}${dateLabel}

      </div>

      <div class="nutri-row" style="margin-top:14px;">

function computeAttendanceInsight(course){
  const sessions = SESSIONS.filter(s=>s.course===course);
  const total = sessions.length;
  let present=0, absent=0;
  for(const s of sessions){
    const st = attendance[keyFor(s)];
    if(st==='P') present++;
    else if(st==='A') absent++;
  }
  const marked = present+absent;
  const pct = marked>0 ? Math.round((present/marked)*100) : null;
  const floorNeeded = Math.ceil(total*0.75); // e.g. 15 of 20
  const stillNeeded = Math.max(0, floorNeeded - present);
  const remainingSessions = total - marked;
  let status, message;
  if(marked===0){
    status = 'watch';
    message = `No attendance marked yet. Mark past sessions in Schedule to track this.`;
  } else if(stillNeeded === 0){
    status = 'safe';
    message = `You're safely past the 75% floor (need ${floorNeeded}/${total}, have ${present}).`;
  } else if(stillNeeded <= remainingSessions){
    status = (pct>=75) ? 'safe' : 'watch';
    message = `Attend ${stillNeeded} of the remaining ${remainingSessions} sessions to stay at/above 75%.`;
  } else {
    status = 'critical';
    message = `Even with perfect attendance from here, you can reach at most ${present+remainingSessions}/${total} (${Math.round(((present+remainingSessions)/total)*100)}%) — below the 75% floor. Talk to the instructor.`;
  }
  return {course, present, absent, marked, total, pct, status, message};
}

function computeKcalProtein(parsed){
  let kcal=0, protein=0;
  for(const k in (parsed.checked||{})){
    if(!parsed.checked[k]) continue;
    const itemName = k.split('::')[1];
    const n = NUTRITION_DB[itemName];
    if(n){ kcal+=n[0]; protein+=n[1]; }
  }
  const eggs = parsed.eggs||0;
  kcal += eggs*70; protein += eggs*6;
  return {kcal, protein};
}

async function loadAllNutritionLogs(){
  if(FIREBASE_ENABLED && currentUser){
    const all = await remoteGetAllNutrition();
    if(!all) return [];
    const logs = Object.keys(all).map(iso=>{
      const {kcal, protein} = computeKcalProtein(all[iso]);
      return {iso, kcal, protein};
    });
    logs.sort((a,b)=> a.iso.localeCompare(b.iso));
    return logs;
  }
  try{
    const listRes = await window.storage.list(NUTRI_KEY_PREFIX, false);
    if(!listRes || !listRes.keys) return [];
    const logs = [];
    for(const key of listRes.keys){
      try{
        const res = await window.storage.get(key, false);
        if(res && res.value){
          const parsed = JSON.parse(res.value);
          const iso = key.replace(NUTRI_KEY_PREFIX, '');
          const {kcal, protein} = computeKcalProtein(parsed);
          logs.push({iso, kcal, protein});
        }
      }catch(e){}
    }
    logs.sort((a,b)=> a.iso.localeCompare(b.iso));
    return logs;
  }catch(e){
    return [];
  }
}

  const watchCount = attnInsights.filter(i=>i.status==='watch').length;
  html += `<div class="insight-msg">${
    criticalCount>0 ? `${criticalCount} course(s) at real risk of breaching the 75% floor — prioritize those sessions.`
    : watchCount>0 ? `${watchCount} course(s) need consistent attendance from here to stay safe.`
    : `All tracked courses are in good shape. Keep marking attendance so this stays accurate.`
  }</div>`;
  html += `</div>`;

  container.innerHTML = html;

  // Nutrition insights (async — loads all logged days)
  const logs = await loadAllNutritionLogs();
  let nutriHtml = `<div class="insight-card"><h3>Nutrition Trends</h3>`;
  if(logs.length===0){
    nutriHtml += `<div class="empty-note">No nutrition entries logged yet. Check off meals in the Nutrition tab to build this up.</div>`;
  } else {
    const avgKcal = Math.round(logs.reduce((a,l)=>a+l.kcal,0)/logs.length);
    const avgProtein = Math.round(logs.reduce((a,l)=>a+l.protein,0)/logs.length);
    const daysHitProtein = logs.filter(l=>l.protein>=PROTEIN_TARGET).length;
    const daysOverCalorie = logs.filter(l=>l.kcal>CALORIE_TARGET).length;
    const proteinGapAvg = Math.round(PROTEIN_TARGET - avgProtein);

    nutriHtml += `<div class="insight-stat-row">
      <div class="insight-stat"><div class="num">${avgKcal}</div><div class="lbl">Avg kcal/day</div></div>
      <div class="insight-stat"><div class="num">${avgProtein}g</div><div class="lbl">Avg protein/day</div></div>
      <div class="insight-stat"><div class="num">${logs.length}</div><div class="lbl">Days logged</div></div>
    </div>`;

    let msg = '';
    if(proteinGapAvg > 10){
      msg += `You're averaging ${proteinGapAvg}g under your ${PROTEIN_TARGET}g protein target — that's roughly ${Math.round(proteinGapAvg/6)} eggs short daily. `;
    } else if(avgProtein >= PROTEIN_TARGET){
      msg += `Protein target is being met on average — nice work. `;
    } else {
      msg += `You're close to your protein target, only ${proteinGapAvg}g short on average. `;
    }
    if(daysOverCalorie > logs.length/2){
      msg += `You've gone over your calorie target on ${daysOverCalorie}/${logs.length} logged days — worth checking portion sizes on gravies and rice.`;
    } else {
      msg += `Calorie intake has stayed within target on most logged days.`;
    }
    nutriHtml += `<div class="insight-msg">${msg}</div>`;
    nutriHtml += `<div class="insight-detail" style="margin-top:8px;">Hit protein target on ${daysHitProtein}/${logs.length} logged days.</div>`;
  }
  nutriHtml += `</div>`;

  container.innerHTML = html + nutriHtml;
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.view+'-view').classList.add('active');
    if(btn.dataset.view === 'insights'){
      renderInsights();
    }
  });
});

async function loadAndRenderAll(){
  await loadAttendance();
  renderBanner();
  renderSchedule();
  renderAttendance();
  renderWholesome();
  await loadNutriLog(nutriDay);
  renderNutriDaySelector();
  renderNutriLog();
  renderNutriSummary();
}

async function initAfterAuth(){
  // called whenever sign-in state changes to a signed-in user
  await loadAndRenderAll();
}

(async function init(){
  initFirebase();
  await trySyncFromSheets();
  await loadAndRenderAll();
})();
</script>
